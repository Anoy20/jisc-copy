<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biology MCQ — Grade XII</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf8f3;
    --warm-white: #fff9f0;
    --ink: #1a1612;
    --ink-light: #4a4035;
    --accent: #c8703a;
    --accent-light: #f0e4d4;
    --green: #3a7d44;
    --green-light: #d4edda;
    --red: #c0392b;
    --red-light: #fde8e6;
    --gold: #d4a017;
    --border: #e0d5c5;
    --shadow: 0 2px 12px rgba(26,22,18,0.08);
    --shadow-hover: 0 6px 24px rgba(26,22,18,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
  header { background: var(--ink); color: var(--cream); text-align: center; padding: 28px 20px 22px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,0.2); }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.3rem, 3vw, 1.9rem); letter-spacing: 0.02em; margin-bottom: 4px; }
  header p { font-size: 0.8rem; color: #b5a990; letter-spacing: 0.08em; text-transform: uppercase; }
  .tab-nav { display: flex; justify-content: center; background: #2a2420; border-bottom: 3px solid var(--accent); }
  .tab-btn { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 36px; background: transparent; color: #b5a990; border: none; cursor: pointer; transition: all 0.25s; position: relative; }
  .tab-btn.active { color: var(--accent); background: rgba(200,112,58,0.1); }
  .tab-btn.active::after { content: ''; position: absolute; bottom: -3px; left: 0; right: 0; height: 3px; background: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--cream); }
  .page { display: none; }
  .page.active { display: block; }
  .container { max-width: 900px; margin: 0 auto; padding: 36px 20px 60px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--ink); margin-bottom: 6px; }
  .section-sub { font-size: 0.82rem; color: var(--ink-light); margin-bottom: 28px; letter-spacing: 0.04em; }
  .revision-grid { display: grid; gap: 14px; }
  .q-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; box-shadow: var(--shadow); transition: box-shadow 0.2s; }
  .q-card:hover { box-shadow: var(--shadow-hover); }
  .q-number { display: inline-block; background: var(--ink); color: var(--cream); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .q-text { font-size: 0.97rem; font-weight: 600; line-height: 1.55; margin-bottom: 14px; color: var(--ink); }
  .options-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 500px) { .options-list { grid-template-columns: 1fr; } }
  .option { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 8px; font-size: 0.88rem; border: 1.5px solid var(--border); background: var(--warm-white); color: var(--ink-light); }
  .option.correct { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 600; }
  .opt-label { font-weight: 700; font-size: 0.78rem; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--border); color: var(--ink-light); flex-shrink: 0; }
  .option.correct .opt-label { background: var(--green); color: white; }
  .checkmark { margin-left: auto; }
  .q-parts { font-size: 0.84rem; color: var(--ink-light); margin-bottom: 10px; padding: 10px 14px; background: var(--accent-light); border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; line-height: 1.7; }
  .test-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; margin-bottom: 28px; }
  .score-badge { background: var(--ink); color: var(--cream); font-family: 'Playfair Display', serif; font-size: 1rem; padding: 8px 20px; border-radius: 30px; }
  .progress-bar-wrap { flex: 1; min-width: 160px; background: var(--border); border-radius: 30px; height: 8px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 30px; transition: width 0.4s ease; }
  .btn { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #b05c2a; transform: translateY(-1px); }
  .btn-secondary { background: var(--ink); color: var(--cream); }
  .btn-secondary:hover { background: #2a2420; transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
  .btn-outline:hover { background: var(--accent); color: white; }
  .test-grid { display: grid; gap: 14px; }
  .test-card { background: white; border: 1.5px solid var(--border); border-radius: 12px; padding: 20px 22px; box-shadow: var(--shadow); }
  .test-option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; border: 1.5px solid var(--border); background: var(--warm-white); color: var(--ink); cursor: pointer; transition: all 0.15s; margin-bottom: 8px; width: 100%; text-align: left; }
  .test-option:hover:not([disabled]) { border-color: var(--accent); background: var(--accent-light); }
  .test-option.selected-correct { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 600; }
  .test-option.selected-wrong { background: var(--red-light); border-color: var(--red); color: var(--red); font-weight: 600; }
  .test-option.reveal-correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
  .test-option[disabled] { cursor: default; }
  .feedback-pill { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; margin-top: 10px; letter-spacing: 0.06em; }
  .pill-correct { background: var(--green-light); color: var(--green); }
  .pill-wrong { background: var(--red-light); color: var(--red); }
  .result-card { background: white; border: 2px solid var(--accent); border-radius: 16px; padding: 36px; text-align: center; box-shadow: var(--shadow-hover); margin-bottom: 28px; }
  .result-card h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 10px; }
  .result-score { font-size: 3.5rem; font-weight: 700; color: var(--accent); line-height: 1; margin: 14px 0; }
  .result-meta { font-size: 0.9rem; color: var(--ink-light); }
  .result-actions { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
  .stem-box { background: var(--accent-light); border-left: 4px solid var(--accent); border-radius: 0 8px 8px 0; padding: 12px 16px; font-size: 0.84rem; color: var(--ink-light); margin-bottom: 14px; font-style: italic; }
  hr.divider { border: none; border-top: 1px dashed var(--border); margin: 8px 0 16px; }
</style>
</head>
<body>

<header>
  <h1>Jahanara Israil School &amp; College</h1>
  <p>Biology 2nd Paper &middot; Grade XII &middot; Sub. Code 179 &middot; Test Exam 2026</p>
</header>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('revision')">&#128214; Revision Mode</button>
  <button class="tab-btn" onclick="switchTab('test')">&#9998; Test Mode</button>
</div>

<div id="revision" class="page active">
  <div class="container">
    <div class="section-title">Answer Key &amp; Revision</div>
    <div class="section-sub">All 25 questions with correct answers highlighted in green</div>
    <div class="revision-grid" id="revisionGrid"></div>
  </div>
</div>

<div id="test" class="page">
  <div class="container">
    <div id="testArea"></div>
  </div>
</div>

<script>
const questions = [
  { id:1, q:"Who introduced Trinomial nomenclature?", opts:["Linnaeus","Schlegel","Lamarck","Mayr"], ans:1 },
  { id:2, q:"Self-fertilization occurred in which phylum?", opts:["Cnidaria","Porifera","Platyhelminthes","Nematoda"], ans:2 },
  { id:3, q:"Which one of the following is the feature of penetrant nematocyst?", opts:["closed at the tip","spiny thread","Butt is stout","secrets sticky juice"], ans:2 },
  { id:4, q:"Haemolymph contains — i) amino acid &nbsp; ii) Uric acid &nbsp; iii) carbondioxide<br>Which one is correct?", parts:["i) amino acid","ii) Uric acid","iii) carbondioxide"], opts:["i, ii","i, iii","ii, iii","i, ii and iii"], ans:1 },
  { id:5, q:"What type of scale found in Rui fish?", opts:["Ganoid","Cycloid","Ctenoid","Placoid"], ans:1 },
  { id:6, q:"Which one is the paired fin of <em>Labeo</em>?", opts:["pectoral","anal","dorsal","caudal"], ans:0 },
  { id:7, q:"Reason of Lub-Dub sound of the heart are — i) Systole of atrium &nbsp; ii) Systole of ventricle &nbsp; iii) Diastole of ventricle<br>Which one is correct?", parts:["i) Systole of atrium","ii) Systole of ventricle","iii) Diastole of ventricle"], opts:["i, ii","i, iii","ii, iii","i, ii and iii"], ans:2 },
  { id:8, q:"Which is protein metabolic enzyme?", opts:["Ptyalin","Amylase","Elastase","Lecithinase"], ans:2 },
  { id:9, q:"Which one is the name of M? (from stomach diagram)", stem:"M points to the inner lining folds of the stomach.", opts:["Serosa","Villus","Ruga","Mucosa"], ans:2 },
  { id:10, q:"Which number of cranial nerve is extended in the organ cited in the stem?", stem:"The organ in the stem is the stomach.", opts:["viii","IX","X","xi"], ans:2 },
  { id:11, q:"From which one sound is produced?", opts:["Vestibule","Larynx","Pharynx","Bronchus"], ans:1 },
  { id:12, q:"Alveolus become large and damaged in which disease?", opts:["Bronchitis","Emphysema","Pleurisy","Pneumonia"], ans:1 },
  { id:13, q:"RBC carries CO&#8322; as — i) KHCO&#8323; &nbsp; ii) NHCOOH &nbsp; iii) NaHCOOH<br>Which one is correct?", parts:["i) KHCO&#8323;","ii) NHCOOH","iii) NaHCOOH"], opts:["i, ii","i, iii","ii, iii","i, ii and iii"], ans:1 },
  { id:14, q:"Which one secretes heparin?", opts:["Neutrophil","Basophil","Eosinophil","Monocyte"], ans:1 },
  { id:15, q:"Which one is the nitrogenous non-protein substance in plasma?", opts:["Fibrinogen","Prothrombin","Creatin","Bilirubin"], ans:2 },
  { id:16, q:'"Ontogeny recapitulates phylogeny" — who proposed the idea?', opts:["Lamarck","Darwin","Haeckel","Hugo de Vries"], ans:2 },
  { id:17, q:'Which cranial bone carries the "Foramen magnum"?', opts:["occipital","Ethmoid","Sphenoid","Temporal"], ans:0 },
  { id:18, q:"Which one is pelvic bone?", opts:["Ilium","Ileum","Scapula","Clavicle"], ans:0 },
  { id:19, q:"Where found hyaline cartilage?", opts:["Larynx","Pinna","Epiglotis","Eustachian tube"], ans:0 },
  { id:20, q:"Which one produced urea?", opts:["Spleen","Pancreas","Kidney","Liver"], ans:3 },
  { id:21, q:"The steps of urine formation are — i) Ultra filtration &nbsp; ii) Reabsorption &nbsp; iii) Tubular secretion<br>Which one is correct?", parts:["i) Ultra filtration","ii) Reabsorption","iii) Tubular secretion"], opts:["i, ii","i, iii","ii, iii","i, ii and iii"], ans:3 },
  { id:22, q:"What is the name of cranial nerve V?", opts:["oculomotor","Trigeminal","Auditory","Trochlear"], ans:1 },
  { id:23, q:"Nerves related to eye muscle — i) Optic &nbsp; ii) Oculomotor &nbsp; iii) Trochlear<br>Which one is correct?", parts:["i) Optic","ii) Oculomotor","iii) Trochlear"], opts:["i, ii","i, iii","ii, iii","i, ii and iii"], ans:2 },
  { id:24, q:"According to the stem what is the phenotypic ratio of F&#8322; generation?", stem:"P: &#9794; Pure black (Dominant) &times; &#9792; Pure white (Recessive) — Guinea pig", opts:["1:2:1","2:1","3:1","9:3:3:1"], ans:2 },
  { id:25, q:"In test cross offspring will — i) Heterozygous &nbsp; ii) Heterozygous Black &nbsp; iii) Homozygous white<br>Which one is correct?", stem:"P: &#9794; Pure black (Dominant) &times; &#9792; Pure white (Recessive) — Guinea pig", parts:["i) Heterozygous","ii) Heterozygous Black","iii) Homozygous white"], opts:["i, ii","i, iii","ii, iii","i, ii and iii"], ans:3 }
];

const labels = ['a','b','c','d'];

function buildRevision() {
  const grid = document.getElementById('revisionGrid');
  grid.innerHTML = '';
  questions.forEach(q => {
    const card = document.createElement('div');
    card.className = 'q-card';
    let html = '<span class="q-number">Q' + q.id + '</span>';
    if (q.stem) html += '<div class="stem-box">&#128204; ' + q.stem + '</div>';
    if (q.parts) {
      html += '<div class="q-parts">' + q.parts.join(' &nbsp;&nbsp; ') + '</div>';
    }
    html += '<div class="q-text">' + q.q + '</div>';
    html += '<div class="options-list">';
    q.opts.forEach((opt, oi) => {
      const isCorrect = oi === q.ans;
      html += '<div class="option ' + (isCorrect ? 'correct' : '') + '">' +
        '<span class="opt-label">' + labels[oi] + '</span>' +
        '<span>' + opt + '</span>' +
        (isCorrect ? '<span class="checkmark">&#10003;</span>' : '') +
        '</div>';
    });
    html += '</div>';
    card.innerHTML = html;
    grid.appendChild(card);
  });
}

let shuffled = [], answered = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startTest() {
  shuffled = shuffle(questions);
  answered = new Array(shuffled.length).fill(null);
  renderTest();
}

function renderTest() {
  const area = document.getElementById('testArea');
  const totalQ = shuffled.length;
  const answeredCount = answered.filter(a => a !== null).length;
  const score = answered.reduce((s, a, i) => s + (a === shuffled[i].ans ? 1 : 0), 0);

  let html = '<div class="section-title">Test Mode</div>' +
    '<div class="section-sub">Questions are shuffled every time you restart</div>' +
    '<div class="test-header">' +
    '<div class="score-badge">Score: ' + score + ' / ' + answeredCount + '</div>' +
    '<div class="progress-bar-wrap"><div class="progress-bar" style="width:' + ((answeredCount/totalQ)*100) + '%"></div></div>' +
    '<div style="font-size:0.8rem;color:var(--ink-light)">' + answeredCount + '/' + totalQ + ' answered</div>' +
    '</div>';

  if (answeredCount === totalQ) {
    const pct = Math.round((score / totalQ) * 100);
    const grade = pct >= 80 ? '&#127942; Excellent!' : pct >= 60 ? '&#128077; Good job!' : '&#128218; Keep practicing!';
    html += '<div class="result-card"><h2>' + grade + '</h2>' +
      '<div class="result-score">' + score + '/' + totalQ + '</div>' +
      '<div class="result-meta">' + pct + '% correct</div>' +
      '<div class="result-actions">' +
      '<button class="btn btn-primary" onclick="startTest()">&#128256; Shuffle &amp; Retry</button>' +
      '<button class="btn btn-secondary" onclick="switchTab(\'revision\')">&#128214; Review Answers</button>' +
      '</div></div>';
  }

  html += '<div class="test-grid">';
  shuffled.forEach((q, qi) => {
    const userAns = answered[qi];
    const isAnswered = userAns !== null;
    html += '<div class="test-card"><span class="q-number">Q' + q.id + '</span>';
    if (q.stem) html += '<div class="stem-box">&#128204; ' + q.stem + '</div>';
    if (q.parts) html += '<div class="q-parts">' + q.parts.join(' &nbsp;&nbsp; ') + '</div>';
    html += '<div class="q-text">' + q.q + '</div><hr class="divider">';
    q.opts.forEach((opt, oi) => {
      let cls = 'test-option';
      if (isAnswered) {
        if (oi === q.ans) cls += ' reveal-correct';
        if (oi === userAns && userAns !== q.ans) cls += ' selected-wrong';
        if (oi === userAns && userAns === q.ans) cls += ' selected-correct';
      }
      const lbg = isAnswered && oi === q.ans ? 'background:var(--green);color:white' : '';
      html += '<button class="' + cls + '" ' + (isAnswered ? 'disabled' : '') +
        ' onclick="pickAnswer(' + qi + ',' + oi + ')">' +
        '<span class="opt-label" style="' + lbg + '">' + labels[oi] + '</span>' +
        opt + '</button>';
    });
    if (isAnswered) {
      const correct = userAns === q.ans;
      html += '<span class="feedback-pill ' + (correct ? 'pill-correct' : 'pill-wrong') + '">' +
        (correct ? '&#10003; Correct!' : '&#10007; Wrong &mdash; correct: ' + labels[q.ans] + ') ' + q.opts[q.ans]) +
        '</span>';
    }
    html += '</div>';
  });
  html += '</div>';

  if (answeredCount < totalQ) {
    html += '<div style="text-align:center;margin-top:28px"><button class="btn btn-outline" onclick="startTest()">&#128256; Restart &amp; Shuffle</button></div>';
  }
  area.innerHTML = html;
}

function pickAnswer(qi, oi) {
  if (answered[qi] !== null) return;
  answered[qi] = oi;
  renderTest();
  const cards = document.querySelectorAll('.test-card');
  if (cards[qi]) cards[qi].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.querySelectorAll('.tab-btn')[tab === 'revision' ? 0 : 1].classList.add('active');
  if (tab === 'test' && shuffled.length === 0) startTest();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildRevision();
</script>
</body>
</html>
